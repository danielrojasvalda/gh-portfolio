<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Lead Intake Automation Architecture</title>
  <desc id="desc">Flow diagram from React UI to n8n webhook to OpenAI extraction to validation layer to structured lead data.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDFC"/>
      <stop offset="100%" stop-color="#F3F0E8"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F5EE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="8" refY="8" orient="auto">
      <path d="M2 2L14 8L2 14V2Z" fill="#0E7C86"/>
    </marker>
    <style>
      .title { font: 700 38px 'DIN Round Pro','DIN Round','Avenir Next','Nunito Sans','Segoe UI',sans-serif; fill: #1E1E1E; }
      .subtitle { font: 600 20px 'DIN Round Pro','DIN Round','Avenir Next','Nunito Sans','Segoe UI',sans-serif; fill: #6F6B66; }
      .node-title { font: 700 28px 'DIN Round Pro','DIN Round','Avenir Next','Nunito Sans','Segoe UI',sans-serif; fill: #1E1E1E; }
      .node-body { font: 500 18px 'DIN Round Pro','DIN Round','Avenir Next','Nunito Sans','Segoe UI',sans-serif; fill: #666666; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="720" rx="32" fill="url(#bgGrad)" stroke="#D6CBBE" stroke-width="2"/>

  <text x="600" y="90" text-anchor="middle" class="title">AI Lead Intake Automation</text>
  <text x="600" y="126" text-anchor="middle" class="subtitle">Lead Capture and Validation Pipeline</text>

  <g transform="translate(600,195)">
    <rect x="-250" y="0" width="500" height="86" rx="22" fill="url(#boxGrad)" stroke="#D6CBBE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="0" y="38" text-anchor="middle" class="node-title">React UI (HubSpot Card)</text>
    <text x="0" y="63" text-anchor="middle" class="node-body">Lead details entered by user</text>
  </g>

  <line x1="600" y1="293" x2="600" y2="344" stroke="#0E7C86" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(600,355)">
    <rect x="-230" y="0" width="460" height="86" rx="22" fill="url(#boxGrad)" stroke="#D6CBBE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="0" y="38" text-anchor="middle" class="node-title">n8n Webhook</text>
    <text x="0" y="63" text-anchor="middle" class="node-body">POST /lead-intake</text>
  </g>

  <line x1="600" y1="453" x2="600" y2="504" stroke="#0E7C86" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(320,515)">
    <rect x="-220" y="0" width="440" height="92" rx="22" fill="url(#boxGrad)" stroke="#D6CBBE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="0" y="42" text-anchor="middle" class="node-title">OpenAI Extraction</text>
    <text x="0" y="68" text-anchor="middle" class="node-body">Parse and normalize inbound fields</text>
  </g>

  <g transform="translate(880,515)">
    <rect x="-220" y="0" width="440" height="92" rx="22" fill="url(#boxGrad)" stroke="#D6CBBE" stroke-width="2" filter="url(#softShadow)"/>
    <text x="0" y="42" text-anchor="middle" class="node-title">Validation Layer</text>
    <text x="0" y="68" text-anchor="middle" class="node-body">Business rules and error handling</text>
  </g>

  <line x1="415" y1="607" x2="540" y2="654" stroke="#0E7C86" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="785" y1="607" x2="660" y2="654" stroke="#0E7C86" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(600,650)">
    <rect x="-250" y="0" width="500" height="68" rx="20" fill="#0E7C86"/>
    <text x="0" y="43" text-anchor="middle" class="node-title" fill="#FFFFFF">Structured Lead Data</text>
  </g>
</svg>
